function b64decode(s){return decodeURIComponent(Array.from(atob(s),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));}
async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function unlock(){const p=document.getElementById("pw").value;const h=await sha256(p);if(h===H){const html=b64decode(D);document.open();document.write(html);document.close();}else{document.getElementById("error").style.display="block";document.getElementById("pw").value="";document.getElementById("pw").focus();}}
